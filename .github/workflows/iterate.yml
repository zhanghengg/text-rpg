name: Iterate Text RPG

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iterate-main
  cancel-in-progress: false

jobs:
  iterate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Iterate
        run: node scripts/auto-iterate.mjs

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit & push
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "text-rpg-bot"
          git config user.email "text-rpg-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore(iterate): auto content update"
          git push origin HEAD:main
